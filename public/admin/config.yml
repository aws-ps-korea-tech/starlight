# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: aws-ps-korea-tech/starlight
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/fe1cd832-eb7f-48c6-9d72-4fbccca461c8/pkce
  auth_token_endpoint: /sites/fe1cd832-eb7f-48c6-9d72-4fbccca461c8/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://main.d2ueu24r76vqp9.amplifyapp.com

media_folder: "src/content/docs/_media"
public_folder: "/_media"

collections:
  - name: "amazon-s3"
    label: "Amazon S3"
    folder: "src/content/docs/amazon-s3"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string", required: false }
      - { label: "Sidebar Order", name: "sidebar", widget: "object", fields: [{ label: "Order", name: "order", widget: "number", required: false }] }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "aws-guide"
    label: "대학 고객을 위한 AWS 길라잡이"
    folder: "src/content/docs/aws"
    create: true
    nested:
      depth: 3
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string", required: false }
      - { label: "Sidebar Order", name: "sidebar", widget: "object", fields: [{ label: "Order", name: "order", widget: "number", required: false }] }
      - { label: "Body", name: "body", widget: "markdown" }
    meta: { path: { widget: "string", label: "Path", index_file: "index" } }

  - name: "omics-on-aws"
    label: "Omics on AWS"
    folder: "src/content/docs/omics-on-aws"
    create: true
    nested:
      depth: 3
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string", required: false }
      - { label: "Sidebar Order", name: "sidebar", widget: "object", fields: [{ label: "Order", name: "order", widget: "number", required: false }] }
      - { label: "Body", name: "body", widget: "markdown" }
    meta: { path: { widget: "string", label: "Path", index_file: "index" } }

  - name: "aws-batch"
    label: "AWS Batch"
    folder: "src/content/docs/aws-batch"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string", required: false }
      - { label: "Sidebar Order", name: "sidebar", widget: "object", fields: [{ label: "Order", name: "order", widget: "number", required: false }] }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "aws-blast"
    label: "AWS BLAST Performance Testing"
    folder: "src/content/docs/aws-blast-performance-testing"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string", required: false }
      - { label: "Sidebar Order", name: "sidebar", widget: "object", fields: [{ label: "Order", name: "order", widget: "number", required: false }] }
      - { label: "Body", name: "body", widget: "markdown" }
